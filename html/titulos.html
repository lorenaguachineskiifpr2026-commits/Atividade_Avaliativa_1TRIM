<!DOCTYPE html>
<html lang="pt-BR">

            <title>Título da página</title>

        <body> 
            <h1 style="color: blue;">Elementos html.</h1>
            <p>Existem vários elementos html, hoje explicaremos o &lt;h1&gt;</p>
            <h3 style="color: blue;">Como usar?</h3>
